<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base :: layout(~{::content})}">
<th:block th:fragment="content">
    <h1 class="title" th:text="${greeting}">Hello!</h1>
    <p class="muted">Use the verification code below to finish creating your Port Buddy account. This code is only valid for the next <span th:text="${expiryMinutes}">10</span> minutes.</p>

    <p style="margin: 18px 0; text-align: center;">
        <span style="display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 34px; font-weight: 700; letter-spacing: 10px; color: #f8fafc; background: #0b0f16; border: 1px solid #1f2937; border-radius: 10px; padding: 14px 22px;"
              th:text="${code}">0000</span>
    </p>

    <p class="muted">
        For security, this code was requested from the Port Buddy CLI. If you did not request it, please ignore this email.
    </p>

    <p class="muted" style="margin-top: 18px;">
        Thanks,<br/>
        The Port Buddy Team
    </p>
</th:block>
</html>
